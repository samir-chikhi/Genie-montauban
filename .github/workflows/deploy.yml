name: Déploiement GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Tous les jours à 5h17 UTC : régénère sitemap, llms.txt et miroirs
    # markdown, les committe, puis le site est redéployé — SEO à jour
    # sans aucune intervention.
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  # write : le workflow committe les fichiers SEO régénérés dans la branche
  # (GitHub Pages sert le contenu de la branche — voir étape "Committer")
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Historique complet requis : les dates <lastmod> du sitemap
          # sont tirées du dernier commit de chaque page
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Régénérer les fichiers SEO (sitemap, llms.txt, miroirs md)
        run: |
          pip install --quiet beautifulsoup4 markdownify
          python generate_seo.py

      - name: Committer les fichiers SEO régénérés
        # GitHub Pages sert le contenu de la branche main : les fichiers
        # régénérés doivent donc être committés pour être publiés.
        # Un push via GITHUB_TOKEN ne redéclenche pas ce workflow (pas de boucle).
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml llms.txt md/
          if ! git diff --cached --quiet; then
            git commit -m "chore(seo): régénération automatique (sitemap, llms.txt, miroirs md)"
            git push
          else
            echo "Aucun changement SEO à committer."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
